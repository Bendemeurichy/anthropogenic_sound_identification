# =============================================================================
# TUSS Hyperparameter Tuning Configuration
# =============================================================================
# This config is ONLY for Optuna hyperparameter tuning.
# For normal training, use src/models/tuss/training_config.yaml
#
# Design philosophy:
# - Separate tuning trials from production training runs
# - Use short epochs (5-10) for fast iteration
# - Focus on most impactful hyperparameters
# - Save results to dedicated tuning directory
# =============================================================================

# Tuning-specific settings
tuning:
  # Number of epochs per trial (keep low for fast iteration)
  num_epochs: 5
  
  # Directory for tuning checkpoints (separate from production)
  checkpoint_dir: "checkpoints/tuning/tuss"
  
  # Whether to save model checkpoints during trials (disable to save space)
  save_checkpoints: false
  
  # Validation frequency
  validate_every_n_epochs: 1

# Data configuration
data:
  df_path: "src/models/tuss/checkpoints/.csv"  # Will be overridden by CLI
  sample_rate: 48000
  segment_length: 4.0
  snr_range: [-10, 10]
  
  # Target classes (will be set dynamically)
  # Format: list of lists, one per COI class
  target_classes:
    - ["bird", "Bird"]
  
  # Disable augmentation for faster tuning
  augment_multiplier: 1
  background_only_prob: 0.3
  background_mix_n: 1
  multi_coi_prob: 0.0
  balance_classes: false
  coi_class_multipliers: null
  
  use_webdataset: false
  webdataset_path: ""

# Model configuration
model:
  # IMPORTANT: Path to pretrained TUSS model
  # This must be set correctly for fine-tuning to work
  pretrained_path: "base/pretrained_models/tuss.medium.2-4src"
  
  # Prompts (will be set dynamically based on target class)
  coi_prompts: ["bird"]
  bg_prompt: "background"
  
  # Prompt initialization
  coi_prompt_init_from: "sfx"
  bg_prompt_init_from: "sfxbg"
  
  # Architecture (loaded from pretrained model)
  encoder_name: "stft"
  encoder_conf: {}
  decoder_name: "stft"
  decoder_conf: {}
  separator_name: "tuss"
  separator_conf: {}
  css_conf: {}
  variance_normalization: true
  
  # This will be tuned by Optuna
  freeze_backbone: false

# Training hyperparameters
training:
  batch_size: 20
  num_workers: 1
  pin_memory: true
  use_amp: true
  amp_dtype: "bf16"
  device: "cuda"
  seed: 42
  clip_grad_norm: 5.0
  patience: 15
  
  # These will be overridden by Optuna trials
  lr: 1.0e-4
  weight_decay: 5.0e-3
  warmup_steps: 200
  grad_accum_steps: 4
  coi_weight: 1.3
  zero_ref_loss_weight: 0.3
  
  # Fixed for tuning
  snr_max: 30
  existing_prompt_lr_multiplier: 0.1
  stabilization_epochs: 0
  backbone_lr_multiplier: 0.05
  
  # Prompt variability (keep disabled for tuning to reduce variance)
  variable_prompts: false
  prompt_dropout_prob: 0.0
  min_coi_prompts: 1
  
  # GPU augmentations (disabled for tuning)
  use_gpu_augmentations: false

# =============================================================================
# Hyperparameter Search Spaces (used by Optuna)
# =============================================================================
# These define the ranges that Optuna will explore during tuning.
# Ranges are carefully chosen based on training config values.
# =============================================================================

hyperparameter_space:
  # === TRAINING HYPERPARAMETERS ===
  
  # Learning rate: centered around 1e-4 (training default)
  # Range: 5e-5 to 2e-4 (log scale)
  lr:
    type: "float"
    low: 5.0e-5
    high: 2.0e-4
    log: true
  
  # Weight decay: training uses 5e-3, but old tuning script went up to 1e-1 (too high!)
  # Range: 1e-3 to 1e-2 (centered around 5e-3)
  weight_decay:
    type: "float"
    low: 1.0e-3
    high: 1.0e-2
    log: true
  
  # COI weight: training uses 1.3
  # Range: 1.0 to 2.0
  coi_weight:
    type: "float"
    low: 1.0
    high: 2.0
  
  # Zero reference loss weight: training uses 0.3
  # Range: 0.1 to 0.5 (log scale)
  zero_ref_loss_weight:
    type: "float"
    low: 0.1
    high: 0.5
    log: true
  
  # Warmup steps: training uses 200
  # Range: 100 to 300
  warmup_steps:
    type: "int"
    low: 100
    high: 300
  
  # Gradient accumulation: training uses 4
  # Options: [2, 4, 8]
  grad_accum_steps:
    type: "categorical"
    choices: [2, 4, 8]
  
  # Whether to freeze pretrained backbone
  # Training uses false (full fine-tuning)
  freeze_backbone:
    type: "categorical"
    choices: [true, false]
