# =============================================================================
# TUSS Fine-tuning Configuration
# =============================================================================
#
# PROMPTS & TARGET CLASSES
# ─────────────────────────
# coi_prompts   : the prompt name(s) injected into the TUSS model, one per
#                 class-of-interest (COI).  Pick short, descriptive names.
# bg_prompt     : a single prompt used for the background (non-COI) stream.
#
# target_classes: maps dataset label strings → prompt indices.
#                 Must be a list-of-lists with the same length as coi_prompts.
#                 Each inner list contains every label string in your metadata
#                 CSV that should be treated as that class.
#
#   Example – planes only (current setup):
#     coi_prompts:    ["airplane"]
#     target_classes: [["airplane", "aircraft", "jet", "propeller_airplane"]]
#
#   Example – planes + birds + train (future expansion):
#     coi_prompts:    ["airplane", "bird", "train"]
#     target_classes:
#       - ["airplane", "aircraft", "jet", "propeller_airplane"]
#       - ["bird", "bird_song", "bird_chirp"]
#       - ["train", "railway", "rail_vehicle"]
#
# coi_prompt_init_from : which pretrained TUSS prompt to warm-start each COI
#                        prompt from.  "sfx" works well for foreground sounds.
# bg_prompt_init_from  : "sfxbg" is the pretrained background prompt.
#
# =============================================================================

data:
  # Path is overwritten at runtime with the sampled dataset CSV;
  # set it here only if you are resuming from a pre-built CSV.
  df_path: ""

  sample_rate: 48000 # Hz – must match your audio files
  segment_length: 4.0 # seconds per training crop

  # SNR range (dB) when mixing a COI source on top of background
  snr_range: [-10, 10]

  # -----------------------------------------------------------------------
  # TARGET CLASSES
  # Map label strings from your metadata CSV to the COI prompts below.
  # This is a list-of-lists: one inner list per entry in model.coi_prompts.
  # -----------------------------------------------------------------------
  target_classes:
    # Class 0 → model.coi_prompts[0] = "airplane"
    # Comprehensive coverage: 30 airplane/aircraft labels from webdataset
    - [
        "aeroplane",
        "air-plane",
        "aircraft",
        "aircrafts",
        "airplane",
        "airplane-landing",
        "airplanes",
        "ariplane",
        "aviation",
        "fighter-aircraft",
        "fighter-jet",
        "fighter-plane",
        "jet",
        "jet-aircraft",
        "jet-engine",
        "jet-fighter",
        "jet-planes",
        "jetliner",
        "jets",
        "light-aircraft",
        "passenger-plane",
        "passengerplane",
        "plane",
        "planes",
        "propeller",
        "propeller-aircarft",
        "propeller-noise",
        "propeller-plane",
        "rotor-plane",
        "turboprop",
      ]
    # Class 1 → model.coi_prompts[1] = "birds"
    # Comprehensive coverage: 81 bird labels from webdataset (includes species)
    - [
        "barred-owls",
        "bird",
        "bird-call",
        "bird-calls",
        "bird-chirping",
        "bird-chorus",
        "bird-song",
        "birds",
        "birdsong",
        "blackbird",
        "blackbirds",
        "carolina-wren",
        "chaffinch",
        "chirping_birds",
        "collared-dove",
        "crow",
        "crows",
        "dawn-birds",
        "dove",
        "doves",
        "duck",
        "duck-decoy",
        "ducks",
        "geese",
        "goose",
        "great-black-backed-gull",
        "grey-shrikethrush",
        "gull",
        "gulls",
        "hen",
        "hens",
        "herring-gull",
        "hummingbird",
        "magpie",
        "magpie-warble",
        "mourning-dove",
        "night-birds",
        "nightbird",
        "nightingale",
        "northern-pygmy-owl",
        "ocean-birds",
        "owl",
        "owl-calls",
        "owlete-nightjar",
        "owls",
        "pigeon",
        "pigeons",
        "raven",
        "ravens",
        "robin",
        "rooster",
        "roosters",
        "sea-gull",
        "seabird",
        "seabirds",
        "seagull",
        "seagulls",
        "shore-bird",
        "songbird",
        "sparrows",
        "starling",
        "starlings",
        "swallow",
        "swallows",
        "swan",
        "swans",
        "tawny-owl",
        "tern",
        "terns",
        "thrush",
        "tits",
        "turkey",
        "turtle-dove",
        "turtledove",
        "warbler",
        "water-birds",
        "waterfowl",
        "woodpecker",
        "wren",
        "zebra-finch",
        "zebrafinch",
      ]

  # Probability that a training sample contains *only* background (no COI)
  background_only_prob: 0.3

  # How many background clips to mix together per sample
  background_mix_n: 1

  # Each audio file is used this many times per epoch (with different
  # augmentations / offsets), effectively multiplying dataset size
  augment_multiplier: 1

  # Probability of mixing a second target class into the mixture during training
  multi_coi_prob: 0.3

  # Balance classes during training to prevent imbalanced datasets from
  # causing one class to dominate. When True, samples from each COI class
  # with equal probability regardless of dataset composition (recommended).
  balance_classes: true

  # Per-class augmentation multipliers to address dataset imbalances.
  # List of integers, one per COI class. E.g., [16, 1] duplicates class-0
  # samples 16x to balance a 1:16 ratio with class-1. Only applied during
  # training. Set to null or [1, 1, ...] to disable.
  coi_class_multipliers: [5, 1] # Airplane=4x, Birds=1x to balance 102:1648 ratio a bit

  # WebDataset configuration for HPC compressed data loading
  # Set use_webdataset: true to load from pre-compressed tar shards
  # instead of individual audio files (much faster on HPC scratch storage)
  use_webdataset: true
  # Path to WebDataset tar shards directory (e.g., $VSC_SCRATCH/webdataset_shards)
  # Only used when use_webdataset is true
  webdataset_path: "$VSC_SCRATCH/webdataset_shards"

model:
  # Path to the pretrained TUSS checkpoint directory (relative to train.py).
  # Set to null to train from scratch using the architecture fields below.
  pretrained_path: "base/pretrained_models/tuss.medium.2-4src"

  # -----------------------------------------------------------------------
  # PROMPTS
  # -----------------------------------------------------------------------
  # One prompt name per COI class.  Must match the length of target_classes.
  coi_prompts:
    - "airplane"
    - "birds"

  # Prompt used for the background / residual stream
  bg_prompt: "background"

  # Pretrained TUSS prompt to warm-start each new COI prompt from.
  # "sfx"   → foreground sound-effects prompt  (good for most events)
  # "sfxbg" → background sound-effects prompt
  # "music" / "speech" → available in the pretrained model as well
  coi_prompt_init_from: "sfx"
  bg_prompt_init_from: "sfxbg"

  # Set to true to freeze all backbone weights and only learn prompt vectors.
  # Faster and less prone to overfitting on small datasets; set to false for
  # full fine-tuning when you have enough data.
  freeze_backbone: false

  # -----------------------------------------------------------------------
  # Architecture (only used when pretrained_path is null)
  # -----------------------------------------------------------------------
  encoder_name: "stft"
  encoder_conf: {}
  decoder_name: "stft"
  decoder_conf: {}
  separator_name: "tuss"
  separator_conf: {}
  css_conf: {}
  variance_normalization: true

training:
  batch_size: 20 # per-GPU batch size (keep low if VRAM is tight)
  grad_accum_steps: 4 # effective batch = batch_size × grad_accum_steps = 16
  use_amp: true # mixed-precision training; disable if unstable
  amp_dtype: "bf16" # "bf16" (recommended, matches pretrained model) or "fp16"

  num_epochs: 200
  patience: 25 # early-stop after this many epochs without improvement

  lr: 5.0e-5
  weight_decay: 1.0e-2
  warmup_steps: 60 # linear LR warm-up

  clip_grad_norm: 5.0

  # Differential learning rates for prompt extension
  # When resuming from a checkpoint, prompts that already exist will train at
  # lr × existing_prompt_lr_multiplier, while new prompts train at full lr.
  existing_prompt_lr_multiplier: 0.1

  # Stabilization phase settings for adding new classes
  # Keep old prompts and backbone frozen (LR=0) for this many epochs
  stabilization_epochs: 0  # Disabled (was 5) to allow immediate prompt learning from epoch 1

  # After stabilization_epochs, if the backbone is not frozen (freeze_backbone=false),
  # it will train at lr * backbone_lr_multiplier
  backbone_lr_multiplier: 0.05

  # -----------------------------------------------------------------------
  # PROMPT VARIABILITY (like base TUSS model training)
  # -----------------------------------------------------------------------
  # Enable variable prompt configurations during training to improve
  # inference flexibility. When enabled, each batch randomly drops COI
  # prompts (keeping background), so the model learns to work with
  # different prompt combinations (similar to base TUSS training).
  #
  # Benefits:
  #   - Inference with subset prompts (e.g., ["airplane", "background"])
  #     performs as well as full prompts (e.g., ["airplane", "birds", "background"])
  #   - Model learns flexible cross-prompt attention patterns
  #   - Enables efficient single-class inference without degradation
  #
  # Recommended settings:
  #   variable_prompts: true
  #   prompt_dropout_prob: 0.5  (50% chance to drop each COI prompt)
  #   min_coi_prompts: 0        (allow background-only samples)
  #
  # Note: Validation always uses all prompts for consistent metrics.
  # -----------------------------------------------------------------------
  variable_prompts: true # Enable variable prompt configurations during training
  prompt_dropout_prob: 0.5 # Probability of dropping each COI prompt per batch
  min_coi_prompts: 0 # Minimum COI prompts per sample (0 = allow background-only)

  # Loss weights
  coi_weight: 1.3 # up-weight COI streams relative to background (reduced from 2.0 to improve BG separation)
  zero_ref_loss_weight: 0.3 # penalty for estimating energy when target is silent (increased from 0.1)
  snr_max: 30 # clip SNR loss at this value (dB)

  num_workers: 1
  pin_memory: true

  # Device to train on.  Can be overridden at runtime with --device / --gpu.
  # Accepted values:
  #   "cuda"    → use the default (best) GPU
  #   "cuda:0"  → first GPU  (explicit index)
  #   "cuda:1"  → second GPU
  #   "cpu"     → force CPU (slow, for debugging only)
  device: "cuda"
  seed: 42

  checkpoint_dir: "checkpoints"
  validate_every_n_epochs: 1

  # Path to a checkpoint .pt file to resume training from.
  # Leave empty to start fresh.  Example: "checkpoints/20250101_120000/best_model.pt"
  resume_from: ""

  # -----------------------------------------------------------------------
  # GPU AUGMENTATION SETTINGS (optimized for aircraft + birds)
  # -----------------------------------------------------------------------
  # Apply augmentations on GPU (10-100x faster than CPU)
  use_gpu_augmentations: true
  
  # Gain: Simulates distance/recording level variations (KEEP)
  gpu_aug_gain_prob: 0.7          # -6 to +6 dB amplitude change
  
  # Noise: Simulates microphone/environment noise (KEEP)
  gpu_aug_noise_prob: 0.4         # Small Gaussian noise (0.001-0.01)
  
  # Time stretch: Changes pitch AND duration together (REDUCE for birds)
  # WARNING: Can shift bird species-specific frequencies!
  # Aircraft: 100Hz → 90-110Hz (changes engine type perception)
  # Birds: 4kHz chirp → 3.6-4.4kHz (breaks species identification)
  gpu_aug_time_stretch_prob: 0.2  # Reduced from default 0.5
  # Recommendation: Set to 0.0 if bird species ID is critical
  
  # Time shift: Circular roll can break transient sounds (REDUCE)
  # Can split bird chirps: "chirp-chirp" → "irp-chi-rp-chi"
  gpu_aug_shift_prob: 0.2         # Reduced from default 0.5
  
  # Low-pass filter: CRITICAL - DISABLED for bird preservation
  # Would remove 5-10kHz bird calls when cutoff is low!
  # Aircraft harmonics also important for discrimination
  gpu_aug_lpf_prob: 0.0           # DISABLED (was 0.3)

# =============================================================================
# QUICK-START RECIPES
# =============================================================================
#
# ── Phase 1: planes + background (current) ──────────────────────────────────
#
#   model:
#     coi_prompts: ["airplane"]
#     bg_prompt:   "background"
#   data:
#     target_classes:
#       - ["airplane", "aircraft", "jet", "propeller_airplane"]
#
# ── Phase 2: add birds ───────────────────────────────────────────────────────
#
#   model:
#     coi_prompts: ["airplane", "bird"]
#     bg_prompt:   "background"
#   data:
#     target_classes:
#       - ["airplane", "aircraft", "jet", "propeller_airplane"]
#       - ["bird", "bird_song", "bird_chirp"]
#
# ── Phase 3: planes + birds + trains ────────────────────────────────────────
#
#   model:
#     coi_prompts: ["airplane", "bird", "train"]
#     bg_prompt:   "background"
#   data:
#     target_classes:
#       - ["airplane", "aircraft", "jet", "propeller_airplane"]
#       - ["bird", "bird_song", "bird_chirp"]
#       - ["train", "railway", "rail_vehicle"]
#
# To resume from a Phase 1 checkpoint in Phase 2, point pretrained_path at
# the Phase 1 checkpoint directory – the existing "airplane" and "background"
# prompt vectors will be reused automatically; only "bird" will be injected
# as a new parameter.
# =============================================================================
