data:
  df_path: "data/aircraft_data.csv"
  sample_rate: 32000
  segment_length: 4.0 # seconds
  snr_range: [-10, 10] # dB range for mixing
  n_coi_classes: 1
  # semantic labels that define the "class of interest" for separation.
  # this list is read by train.py and saved with the checkpoint so that
  # downstream inference/validation pipelines can report which categories
  # were targeted.
  #
  # Single-class mode (n_coi_classes=1): set target_classes only.
  # Multi-class mode  (n_coi_classes>1): set coi_classes instead;
  #   target_classes is derived automatically as the union of all label lists.
  target_classes:
    - "airplane"
    - "Airplane"
    - "plane"
  # Per-class config for multi-class separation (n_coi_classes > 1).
  # Each entry = one output head (index 0, 1, ..., n_coi_classes-1).
  #   labels:  semantic labels to match in the metadata 'label' column
  #   dataset: optional case-insensitive substring filter on the 'dataset' column
  #            (leave empty "" to accept that class's labels from any dataset)
  #   name:    human-readable label used in log output
  # Background is always the last head — no entry needed.
  # Leave empty ([]) for single-class mode.
  #
  # Example — 2 COI classes (aircraft + birds from separate datasets):
  #   coi_classes:
  #     - labels: ["airplane", "Airplane", "plane"]
  #       dataset: "aerosonicdb"
  #       name: "aircraft"
  #     - labels: ["bird", "Bird", "birdsong"]
  #       dataset: "birds_dataset"
  #       name: "birds"
  coi_classes: []
  # low for backgrounds without labels, change to 0.3 when labels retrieved
  background_only_prob: 0.3
  # How many non-COI files to sum for background-only examples
  background_mix_n: 1
  # Augmentation multiplier: each COI sample seen 3x with random augmentations
  augment_multiplier: 2
  # Probability (0..1) that each *other* COI class is independently added to a
  # training mixture.  0.0 = disabled (single COI class per sample, default).
  # Only meaningful when n_coi_classes > 1.
  multi_coi_prob: 0.0

# Model settings - using proven SuDoRM-RF defaults
model:
  type: "improved" # 'improved' or 'groupcomm'
  # number of channels output by the model, bottleneck
  out_channels: 256
  # number of channels in the internal representations
  in_channels: 512
  num_blocks: 16
  upsampling_depth: 5
  # Number of basis functions for encoder/decoder - 512 on speech separation, 2048 is more computation finer details,
  # 4096 overkill for COI separation and overfitting on small datasets
  enc_num_basis: 1024
  # Scale with segment length and sample rate to ensure sufficient temporal context for COI separation
  enc_kernel_size: 41
  # COI separation head U-ConvBlocks
  # 0 = simple architecture (PReLU + Conv1d)
  # >0 = enhanced architecture with N UConvBlocks per branch for class-specific feature extraction
  num_head_conv_blocks: 2
  # Expanded dimension for UConvBlock internal processing
  # null/None = use in_channels (512), or set explicitly (e.g., 128 for smaller model)
  expanded_channels: null

# Training settings - optimized for COI separation
training:
  batch_size: 2
  grad_accum_steps: 16
  use_amp: true
  num_epochs: 400
  lr: 5e-4
  weight_decay: 1e-4
  num_workers: 1
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 1
  clip_grad_norm: 5.0
  patience: 20
  checkpoint_dir: "checkpoints"
  device: "cuda:0"
  compile_model: false
  compile_backend: "eager"
  class_weight: 2.0
  aux_waveform_weight: 0.0
  warmup_steps: 400
  validate_every_n_epochs: 1
  seed: 42
